name: Validate Version Consistency

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate-version:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Fetch all history for git tag comparison
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
    
    - name: Run version consistency check
      id: version-check
      run: |
        echo "Running version consistency validation..."
        python scripts/version-check.py
      continue-on-error: true
    
    - name: Check version validation result
      if: steps.version-check.outcome == 'failure'
      run: |
        echo "❌ Version consistency validation failed!"
        echo ""
        echo "Common issues and solutions:"
        echo "- Ensure manifest.json version follows semantic versioning (MAJOR.MINOR.PATCH)"
        echo "- Check that version in manifest.json matches expected format"
        echo "- Verify that version changes are appropriate for the type of changes made"
        echo "- For releases, ensure a corresponding Git tag will be created"
        echo ""
        echo "Please review the version-check.py output above for specific details."
        exit 1
    
    - name: Version validation successful
      if: steps.version-check.outcome == 'success'
      run: |
        echo "✅ Version consistency validation passed!"
        echo "All version checks completed successfully."